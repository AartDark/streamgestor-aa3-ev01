<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Películas</title><link rel="stylesheet" th:href="@{/css/estilos.css}"></head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<main class="main">
<section class="page-header-card">
    <div><h1>Películas</h1><p>Administra el catálogo disponible para reservas.</p></div>
    <a class="btn" th:href="@{/peliculas/nuevo}">Nueva película</a>
</section>
<section class="card">
<div class="table-responsive">
<table class="table">
<thead><tr><th>ID</th><th>Título</th><th>Categoría</th><th>Año</th><th>Estado</th><th>Acciones</th></tr></thead>
<tbody>
<tr th:each="pelicula : ${peliculas}">
<td th:text="${pelicula.id}"></td>
<td th:text="${pelicula.titulo}"></td>
<td th:text="${pelicula.categoria.nombre}"></td>
<td th:text="${pelicula.anio}"></td>
<td><span class="status-pill" th:text="${pelicula.estado}"></span></td>
<td class="actions"><a class="btn secondary btn-sm" th:href="@{/peliculas/editar/{id}(id=${pelicula.id})}">Editar</a><a class="btn danger btn-sm confirm-delete" th:href="@{/peliculas/eliminar/{id}(id=${pelicula.id})}">Eliminar</a></td>
</tr>
</tbody>
</table>
</div>
</section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
