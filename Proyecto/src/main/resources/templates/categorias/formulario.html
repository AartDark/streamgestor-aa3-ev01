<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Formulario Categoría</title><link rel="stylesheet" th:href="@{/css/estilos.css}"></head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<main class="main">
<section class="page-header-card">
    <div><h1>Categoría</h1><p>Formulario de registro y actualización.</p></div>
</section>
<section class="card">
<form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post" class="form-grid">
<input type="hidden" th:field="*{id}">
<div class="form-group full-width"><label>Nombre</label><input type="text" th:field="*{nombre}" required><div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea th:field="*{descripcion}" rows="5"></textarea><div class="error" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div></div>
<div class="form-actions full-width">
    <button class="btn" type="submit">Guardar</button>
    <a class="btn secondary" th:href="@{/categorias}">Cancelar</a>
</div>
</form>
</section>
</main>
</body>
</html>
