<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Formulario Película</title><link rel="stylesheet" th:href="@{/css/estilos.css}"></head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<main class="main">
<section class="page-header-card">
    <div><h1>Película</h1><p>Formulario de registro y actualización.</p></div>
</section>
<section class="card">
<form th:action="@{/peliculas/guardar}" th:object="${pelicula}" method="post" class="form-grid">
<input type="hidden" th:field="*{id}">
<div class="form-group full-width"><label>Título</label><input type="text" th:field="*{titulo}" required><div class="error" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div></div>
<div class="form-group full-width"><label>Descripción</label><textarea th:field="*{descripcion}" rows="5"></textarea><div class="error" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div></div>
<div class="form-group"><label>Año</label><input type="number" th:field="*{anio}" required><div class="error" th:if="${#fields.hasErrors('anio')}" th:errors="*{anio}"></div></div>
<div class="form-group"><label>Categoría</label><select name="categoriaId" required><option value="">Seleccione...</option><option th:each="categoria : ${categorias}" th:value="${categoria.id}" th:text="${categoria.nombre}" th:selected="${pelicula.categoria != null and pelicula.categoria.id == categoria.id}"></option></select><div class="error" th:if="${errorCategoria}" th:text="${errorCategoria}"></div></div>
<div class="form-group"><label>Estado</label><select th:field="*{estado}"><option value="Disponible">Disponible</option><option value="No disponible">No disponible</option></select></div>
<div class="form-actions full-width">
    <button class="btn" type="submit">Guardar</button>
    <a class="btn secondary" th:href="@{/peliculas}">Cancelar</a>
</div>
</form>
</section>
</main>
</body>
</html>
