<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - StreamGestor</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <h1>StreamGestor</h1>
        <p>Ingrese con el usuario administrador para acceder al módulo.</p>

        <div class="alert" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="correo">Correo</label>
                <input type="email" id="correo" name="correo" placeholder="admin@streaminggestor.com" required>
            </div>

            <div class="form-group">
                <label for="clave">Contraseña</label>
                <input type="password" id="clave" name="clave" placeholder="admin123" required>
            </div>

            <button type="submit" class="btn">Iniciar sesión</button>
        </form>
    </div>
</div>
</body>
</html>
