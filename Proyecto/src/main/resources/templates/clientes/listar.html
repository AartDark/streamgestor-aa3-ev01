<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Clientes</title><link rel="stylesheet" th:href="@{/css/estilos.css}"></head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<main class="main">
<section class="page-header-card">
    <div><h1>Clientes</h1><p>Consulta, registra, actualiza y elimina clientes del sistema.</p></div>
    <a class="btn" th:href="@{/clientes/nuevo}">Nuevo cliente</a>
</section>
<section class="card">
<div class="table-responsive">
<table class="table">
<thead><tr><th>ID</th><th>Nombre</th><th>Documento</th><th>Teléfono</th><th>Correo</th><th>Estado</th><th>Acciones</th></tr></thead>
<tbody>
<tr th:each="cliente : ${clientes}">
<td th:text="${cliente.id}"></td>
<td th:text="${cliente.nombre}"></td>
<td th:text="${cliente.documento}"></td>
<td th:text="${cliente.telefono}"></td>
<td th:text="${cliente.correo}"></td>
<td><span class="status-pill" th:text="${cliente.estado}"></span></td>
<td class="actions"><a class="btn secondary btn-sm" th:href="@{/clientes/editar/{id}(id=${cliente.id})}">Editar</a><a class="btn danger btn-sm confirm-delete" th:href="@{/clientes/eliminar/{id}(id=${cliente.id})}">Eliminar</a></td>
</tr>
</tbody>
</table>
</div>
</section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
